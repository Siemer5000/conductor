<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Conductor</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #0d1117;
  --bg-secondary: #161b22;
  --bg-tertiary: #1c2128;
  --border: #30363d;
  --border-light: #3d444d;
  --text-primary: #e6edf3;
  --text-secondary: #8b949e;
  --text-muted: #656d76;
  --green: #3fb950;
  --green-bg: rgba(63, 185, 80, 0.1);
  --yellow: #d29922;
  --yellow-bg: rgba(210, 153, 34, 0.1);
  --red: #f85149;
  --red-bg: rgba(248, 81, 73, 0.1);
  --blue: #58a6ff;
  --blue-bg: rgba(88, 166, 255, 0.1);
  --purple: #bc8cff;
  --purple-bg: rgba(188, 140, 255, 0.1);
  --orange: #f0883e;
  --orange-bg: rgba(240, 136, 62, 0.1);
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
  --radius: 10px;
  --radius-sm: 7px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
}

[data-theme="light"] {
  --bg-primary: #f5f5f7;
  --bg-secondary: #ffffff;
  --bg-tertiary: #f0f0f2;
  --border: rgba(0,0,0,0.09);
  --border-light: rgba(0,0,0,0.05);
  --text-primary: #1d1d1f;
  --text-secondary: #515154;
  --text-muted: #86868b;
  --green: #1a7f37;
  --green-bg: rgba(26, 127, 55, 0.08);
  --yellow: #9a6700;
  --yellow-bg: rgba(154, 103, 0, 0.08);
  --red: #cf222e;
  --red-bg: rgba(207, 34, 46, 0.08);
  --blue: #0066cc;
  --blue-bg: rgba(0, 102, 204, 0.08);
  --purple: #6e40c9;
  --purple-bg: rgba(110, 64, 201, 0.08);
  --orange: #bc4c00;
  --orange-bg: rgba(188, 76, 0, 0.08);
  --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 6px 20px rgba(0,0,0,0.07);
}

[data-theme="light"] ::-webkit-scrollbar-thumb { background: #c7c7cc; }
[data-theme="light"] ::-webkit-scrollbar-thumb:hover { background: #aeaeb2; }
[data-theme="light"] ::-webkit-scrollbar-track { background: transparent; }

html, body {
  height: 100%;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-sans);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
}

.app {
  display: grid;
  grid-template-rows: auto 1fr;
  grid-template-columns: 300px 1fr;
  height: 100vh;
}

/* ─── Header ────────────────────────────────────────────────────────────── */
.header {
  grid-column: 1 / -1;
  display: flex;
  align-items: stretch;
  padding: 0 20px;
  min-height: 60px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  z-index: 10;
}

.header-left { width: 280px; flex-shrink: 0; display: flex; align-items: center; }
.header-right { display: flex; align-items: center; gap: 14px; margin-left: auto; }
.brand { display: flex; align-items: center; gap: 9px; cursor: pointer; padding: 4px 0; }
.brand-icon { width: 26px; height: 26px; background: linear-gradient(135deg, #4f8ef7 0%, #9b6bff 100%); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.brand-icon svg { width: 14px; height: 14px; color: #fff; }
.brand-name { font-size: 18px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.04em; }
.brand-name span { color: var(--text-muted); font-weight: 400; }
.header-divider { width: 1px; height: 20px; background: var(--border); }
.header-subtitle { font-size: 11px; color: var(--text-muted); margin-left: 4px; }

.header-nav { display: flex; align-items: stretch; height: 100%; gap: 2px; }
.header-nav-btn {
  padding: 0 18px; height: 100%; display: flex; align-items: center;
  font-size: 13px; font-weight: 500; color: var(--text-secondary);
  background: none; border: none; border-bottom: 2px solid transparent;
  cursor: pointer; transition: all 0.15s; font-family: var(--font-sans);
  letter-spacing: -0.01em; white-space: nowrap;
  margin-bottom: -1px; /* align bottom border with header border */
}
.header-nav-btn:hover { color: var(--text-primary); background: var(--bg-tertiary); }
.header-nav-btn.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }

.stats { display: flex; gap: 12px; align-items: center; }
.stat { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-secondary); }
.stat-dot { width: 7px; height: 7px; border-radius: 50%; }
.stat-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); }
.stat-dot.waiting { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
.stat-dot.completed { background: var(--blue); }
.stat-dot.processing { background: var(--purple); box-shadow: 0 0 6px var(--purple); }
.stat-count { font-weight: 600; color: var(--text-primary); }

.cost-ticker { font-size: 12px; color: var(--green); font-family: var(--font-mono); font-weight: 600; padding: 3px 10px; background: var(--green-bg); border-radius: 12px; }

.header-actions { display: flex; gap: 8px; align-items: center; }

.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg-tertiary); color: var(--text-secondary); font-size: 12px;
  cursor: pointer; transition: all 0.15s ease; font-family: var(--font-sans);
}
.btn:hover { background: var(--border); color: var(--text-primary); }
.btn-primary { background: var(--blue); border-color: var(--blue); color: #fff; }
.btn-primary:hover { opacity: 0.9; }
.btn-approve { background: var(--green); border-color: var(--green); color: #fff; font-weight: 600; }
.btn-approve:hover { opacity: 0.85; }
.btn-deny { background: transparent; border-color: var(--red); color: var(--red); }
.btn-deny:hover { background: var(--red-bg); }

/* ─── Risk badges ───────────────────────────────────────────────────────── */
.risk-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 7px; border-radius: 20px; font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
.risk-badge.low    { background: var(--green-bg);  color: var(--green);  border: 1px solid var(--green); }
.risk-badge.medium { background: var(--yellow-bg); color: var(--yellow); border: 1px solid var(--yellow); }
.risk-badge.high   { background: var(--red-bg);    color: var(--red);    border: 1px solid var(--red); }
.risk-badge.critical { background: var(--red); color: #fff; border: 1px solid var(--red); animation: pulse 1.2s infinite; }

/* ─── Approval banner (top of main panel) ───────────────────────────────── */
.approval-banner { display: flex; align-items: flex-start; gap: 12px; padding: 14px 18px; background: rgba(210,153,34,0.12); border: 1px solid var(--yellow); border-radius: var(--radius); margin-bottom: 14px; }
.approval-banner-icon { font-size: 22px; line-height: 1; flex-shrink: 0; margin-top: 2px; }
.approval-banner-body { flex: 1; min-width: 0; }
.approval-banner-title { font-weight: 700; color: var(--yellow); font-size: 13px; margin-bottom: 3px; }
.approval-banner-plain { font-size: 12px; color: var(--text-primary); margin-bottom: 6px; word-break: break-word; }
.approval-banner-reason { font-size: 11px; color: var(--text-secondary); font-family: var(--font-mono); word-break: break-word; }
.approval-banner-actions { display: flex; align-items: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
.btn-danger { background: transparent; border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: var(--red-bg); }
.btn-warning { background: transparent; border-color: var(--yellow); color: var(--yellow); }
.btn-warning:hover { background: var(--yellow-bg); }
.btn-sm { padding: 3px 7px; font-size: 11px; }

.connection-status { width: 7px; height: 7px; border-radius: 50%; background: var(--red); transition: background 0.3s; }
.connection-status.connected { background: var(--green); }

/* ─── Sidebar ───────────────────────────────────────────────────────────── */
.sidebar { background: var(--bg-secondary); border-right: 1px solid var(--border); overflow-y: auto; display: flex; flex-direction: column; }


.search-box { padding: 7px 10px; margin: 6px 10px; width: calc(100% - 20px); background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 12px; font-family: var(--font-sans); outline: none; }
.search-box:focus { border-color: var(--blue); }
.search-box::placeholder { color: var(--text-muted); }

.project-list { flex: 1; overflow-y: auto; padding: 2px 0; }
.project-item { border-bottom: 1px solid var(--border); }
.project-header { display: flex; align-items: center; padding: 8px 12px; cursor: pointer; transition: background 0.1s; gap: 6px; }
.project-header:hover { background: var(--bg-tertiary); }
.project-chevron { width: 14px; height: 14px; color: var(--text-muted); transition: transform 0.2s; flex-shrink: 0; }
.project-item.expanded .project-chevron { transform: rotate(90deg); }
.project-name { flex: 1; font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.project-badge { font-size: 10px; padding: 1px 5px; border-radius: 10px; background: var(--bg-tertiary); color: var(--text-muted); border: 1px solid var(--border); }

.session-list { display: none; padding: 0 0 2px 0; }
.project-item.expanded .session-list { display: block; }

.session-item { display: flex; align-items: center; padding: 6px 12px 6px 34px; cursor: pointer; transition: background 0.1s; gap: 6px; }
.session-item:hover { background: var(--bg-tertiary); }
.session-item.selected { background: var(--blue-bg); border-right: 2px solid var(--blue); }

.session-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.session-status-dot.active { background: var(--green); box-shadow: 0 0 4px var(--green); }
.session-status-dot.idle { background: var(--text-muted); }
.session-status-dot.waiting_for_approval { background: var(--yellow); box-shadow: 0 0 4px var(--yellow); animation: pulse 2s infinite; }
.session-status-dot.processing { background: var(--purple); box-shadow: 0 0 4px var(--purple); animation: pulse 1.5s infinite; }
.session-status-dot.completed { background: var(--blue); opacity: 0.6; }
.session-status-dot.paused { background: var(--orange); box-shadow: 0 0 4px var(--orange); }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.session-info { flex: 1; min-width: 0; }
.session-name { font-size: 12px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.session-meta { font-size: 10px; color: var(--text-muted); }
.session-entrypoint { font-size: 10px; padding: 1px 4px; border-radius: 3px; background: var(--bg-primary); color: var(--text-muted); flex-shrink: 0; }

/* ─── Main Panel ────────────────────────────────────────────────────────── */
.main { overflow-y: auto; padding: 20px; min-height: 0; }

.overview { display: flex; flex-direction: column; gap: 16px; }
.overview-title { font-size: 18px; font-weight: 600; }
.overview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; }
.overview-list { display: flex; flex-direction: column; gap: 0; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }

.overview-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; cursor: pointer; transition: all 0.15s ease; }
.overview-card:hover { border-color: var(--border-light); transform: translateY(-1px); box-shadow: var(--shadow); }
.overview-list .overview-card { border: none; border-bottom: 1px solid var(--border); border-radius: 0; transform: none !important; display: grid; grid-template-columns: 18px 1fr auto; grid-template-rows: auto auto; column-gap: 10px; align-items: center; padding: 10px 14px; }
.overview-list .overview-card:last-child { border-bottom: none; }
.overview-list .overview-card:hover { background: var(--bg-tertiary); box-shadow: none; }
.overview-list .overview-card-header { margin-bottom: 0; grid-column: 2; grid-row: 1; }
.overview-list .overview-card-title { font-size: 14px; }
.overview-list .overview-card-slug { display: none; }
.overview-list .overview-card-summary { grid-column: 2; grid-row: 2; margin-top: 2px; -webkit-line-clamp: 1; font-size: 11px; }
.overview-list .overview-card-footer { border-top: none; margin-top: 0; padding-top: 0; grid-column: 3; grid-row: 1 / 3; flex-direction: column; align-items: flex-end; gap: 2px; justify-content: center; }
.overview-list .session-status-dot { grid-column: 1; grid-row: 1 / 3; align-self: center; }
.overview-list .overview-card-header .session-status-dot { display: none; }
.overview-list .list-dot { display: flex !important; }
.overview-list .approval-inline { grid-column: 2 / 4; }

.sort-btn { display: flex; align-items: center; gap: 4px; padding: 4px 9px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 11px; font-weight: 500; font-family: var(--font-sans); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.sort-btn:hover { border-color: var(--border-light); color: var(--text-secondary); }
.sort-btn.active { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.view-toggle { display: flex; gap: 2px; background: var(--bg-tertiary); border-radius: var(--radius-sm); padding: 2px; }
.view-toggle-btn { background: none; border: none; padding: 4px 7px; border-radius: 4px; cursor: pointer; color: var(--text-muted); display: flex; align-items: center; transition: all 0.1s; }
.view-toggle-btn.active { background: var(--bg-secondary); color: var(--text-primary); }
.view-toggle-btn:hover:not(.active) { color: var(--text-secondary); }

.status-filters { display: flex; gap: 4px; }
.status-filter-btn { padding: 4px 10px; border-radius: 12px; border: 1px solid var(--border); background: transparent; color: var(--text-muted); font-size: 11px; font-weight: 500; font-family: var(--font-sans); cursor: pointer; transition: all 0.15s; white-space: nowrap; }
.status-filter-btn:hover { border-color: var(--border-light); color: var(--text-secondary); }
.status-filter-btn.active { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
.status-filter-btn.active.f-waiting { background: var(--yellow-bg); border-color: var(--yellow); color: var(--yellow); }
.status-filter-btn.active.f-done { background: var(--bg-tertiary); border-color: var(--border-light); color: var(--text-secondary); }

.overview-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.overview-card-title { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; letter-spacing: -0.01em; }
.overview-card-slug { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }
.overview-card-summary { font-size: 12px; color: var(--text-secondary); margin-top: 6px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.overview-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; padding-top: 8px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); }

.status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
.status-badge.active { background: var(--green-bg); color: var(--green); }
.status-badge.idle { background: var(--bg-tertiary); color: var(--text-muted); }
.status-badge.waiting_for_approval { background: var(--yellow-bg); color: var(--yellow); }
.status-badge.processing { background: var(--purple-bg); color: var(--purple); }
.status-badge.completed { background: var(--blue-bg); color: var(--blue); }
.status-badge.paused { background: var(--orange-bg); color: var(--orange); }

/* ─── Session Detail ────────────────────────────────────────────────────── */
.session-detail { display: flex; flex-direction: column; gap: 14px; }
.detail-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
.detail-title-row { display: flex; align-items: center; gap: 10px; }
.detail-title { font-size: 18px; font-weight: 600; }
.detail-meta { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 4px; }
.detail-meta-item { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-secondary); }
.detail-meta-item svg { width: 13px; height: 13px; color: var(--text-muted); }
.detail-meta-label { color: var(--text-muted); }

/* ─── Agent Control Bar ─────────────────────────────────────────────────── */
.control-bar { display: flex; gap: 6px; align-items: center; padding: 10px 14px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); flex-wrap: wrap; }
.control-bar-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-right: 4px; }
.control-bar .btn { font-size: 11px; padding: 4px 10px; }

/* ─── Token Stats ───────────────────────────────────────────────────────── */
.token-panel { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.token-panel-title { font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
.token-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
.token-stat { text-align: center; }
.token-stat-value { font-size: 18px; font-weight: 700; font-family: var(--font-mono); }
.token-stat-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
.token-bar { height: 6px; background: var(--bg-tertiary); border-radius: 3px; margin-top: 10px; overflow: hidden; display: flex; }
.token-bar-segment { height: 100%; transition: width 0.3s; }

/* ─── Git Panel ─────────────────────────────────────────────────────────── */
.panel { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.panel-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; cursor: pointer; transition: background 0.1s; }
.panel-header:hover { background: var(--bg-tertiary); }
.panel-header-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
.panel-body { padding: 12px 14px; border-top: 1px solid var(--border); }
.panel-body.hidden { display: none; }

.git-file-list { font-family: var(--font-mono); font-size: 11px; max-height: 150px; overflow-y: auto; }
.git-file { padding: 2px 0; display: flex; gap: 8px; color: var(--text-secondary); }
.git-file-status { width: 14px; text-align: center; font-weight: 600; }
.git-file-status.M { color: var(--yellow); }
.git-file-status.A { color: var(--green); }
.git-file-status.D { color: var(--red); }
.git-file-status.U { color: var(--purple); }

.git-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
.git-input { flex: 1; min-width: 180px; padding: 5px 8px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 12px; font-family: var(--font-sans); outline: none; }
.git-input:focus { border-color: var(--blue); }

.git-log { font-family: var(--font-mono); font-size: 11px; max-height: 120px; overflow-y: auto; margin-top: 8px; }
.git-commit { padding: 3px 0; display: flex; gap: 8px; color: var(--text-secondary); }
.git-commit-hash { color: var(--blue); width: 60px; flex-shrink: 0; }
.git-commit-msg { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.git-commit-time { color: var(--text-muted); flex-shrink: 0; }

/* ─── Deploy Panel ──────────────────────────────────────────────────────── */
.deploy-status { display: flex; align-items: center; gap: 8px; font-size: 12px; }
.deploy-actions { display: flex; gap: 6px; margin-top: 8px; }

/* ─── Inject Prompt Modal ───────────────────────────────────────────────── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 100; display: none; align-items: center; justify-content: center; }
.modal-overlay.visible { display: flex; }
.modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; width: 500px; max-width: 90vw; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
.modal-title { font-size: 16px; font-weight: 600; margin-bottom: 12px; }
.modal textarea { width: 100%; height: 120px; padding: 10px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-family: var(--font-mono); font-size: 13px; resize: vertical; outline: none; }
.modal textarea:focus { border-color: var(--blue); }
.modal-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }

/* ─── Approval Cards ────────────────────────────────────────────────────── */
.approval-section { display: flex; flex-direction: column; gap: 8px; }
.approval-section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: var(--yellow); display: flex; align-items: center; gap: 6px; }
.approval-card { background: var(--bg-secondary); border: 1px solid var(--yellow); border-radius: var(--radius); padding: 14px; animation: slideIn 0.3s ease; }
@keyframes slideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
.approval-tool-name { font-size: 13px; font-weight: 600; font-family: var(--font-mono); color: var(--yellow); margin-bottom: 6px; }
.approval-input { font-family: var(--font-mono); font-size: 11px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 10px; color: var(--text-secondary); max-height: 100px; overflow-y: auto; white-space: pre-wrap; word-break: break-all; margin-bottom: 10px; }
.approval-actions { display: flex; gap: 6px; }

/* ─── Message Feed ──────────────────────────────────────────────────────── */
.messages-section { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.messages-header { padding: 8px 14px; border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 600; color: var(--text-secondary); display: flex; align-items: center; justify-content: space-between; }
.messages-feed { max-height: 400px; overflow-y: auto; padding: 4px 0; }
.message { padding: 6px 14px; border-bottom: 1px solid var(--border); transition: background 0.1s; }
.message:hover { background: var(--bg-tertiary); }
.message:last-child { border-bottom: none; }
.message-header { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.message-role { font-size: 11px; font-weight: 600; padding: 1px 5px; border-radius: 3px; }
.message-role.user { background: var(--blue-bg); color: var(--blue); }
.message-role.assistant { background: var(--purple-bg); color: var(--purple); }
.message-role.tool_result { background: var(--green-bg); color: var(--green); }
.message-role.tool_result.error { background: var(--red-bg); color: var(--red); }
.message-role.system { background: var(--bg-tertiary); color: var(--text-muted); }
.message-time { font-size: 10px; color: var(--text-muted); }
.message-text { font-size: 12px; color: var(--text-secondary); line-height: 1.4; white-space: pre-wrap; word-break: break-word; max-height: 120px; overflow: hidden; }
.message-text.expanded { max-height: none; }
.message-expand { font-size: 11px; color: var(--blue); cursor: pointer; margin-top: 2px; }
.tool-use-list { display: flex; flex-direction: column; gap: 3px; margin-top: 4px; }
.tool-tag { display: inline-flex; align-items: center; gap: 4px; padding: 2px 6px; background: var(--bg-primary); border: 1px solid var(--border); border-radius: 3px; font-size: 11px; font-family: var(--font-mono); color: var(--orange); }
.tool-tag-input { color: var(--text-muted); max-width: 350px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* ─── Analytics View ────────────────────────────────────────────────────── */
.analytics { display: flex; flex-direction: column; gap: 16px; }
.analytics-summary { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.analytics-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; text-align: center; }
.analytics-card-value { font-size: 28px; font-weight: 700; font-family: var(--font-mono); }
.analytics-card-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px; }
.analytics-bar-chart { display: flex; flex-direction: column; gap: 6px; }
.analytics-bar-row { display: flex; align-items: center; gap: 10px; font-size: 12px; }
.analytics-bar-label { width: 180px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text-secondary); flex-shrink: 0; }
.analytics-bar-track { flex: 1; height: 20px; background: var(--bg-tertiary); border-radius: 3px; overflow: hidden; }
.analytics-bar-fill { height: 100%; background: var(--blue); border-radius: 3px; transition: width 0.5s; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; font-size: 10px; font-weight: 600; color: #fff; min-width: 40px; }
.analytics-bar-cost { width: 80px; text-align: right; font-family: var(--font-mono); font-size: 12px; color: var(--green); flex-shrink: 0; }

/* ─── Permissions Tab ──────────────────────────────────────── */
.perm-section { margin-bottom: 28px; }
.perm-section-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
.perm-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 8px; }
.perm-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; transition: border-color 0.15s; }
.perm-card.is-allow { border-color: var(--green); background: var(--green-bg); }
.perm-card.is-deny { border-color: var(--red); background: var(--red-bg); }
.perm-card-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.perm-card-name { font-size: 13px; font-weight: 600; font-family: var(--font-mono); color: var(--text-primary); }
.perm-card-desc { font-size: 11px; color: var(--text-muted); }
.perm-toggle { display: flex; gap: 2px; background: var(--bg-tertiary); border-radius: var(--radius-sm); padding: 2px; }
.perm-toggle-btn { padding: 3px 8px; border-radius: 4px; border: none; background: none; font-size: 11px; font-weight: 500; cursor: pointer; font-family: var(--font-sans); color: var(--text-muted); transition: all 0.1s; white-space: nowrap; }
.perm-toggle-btn.active-allow { background: var(--green); color: #fff; }
.perm-toggle-btn.active-deny { background: var(--red); color: #fff; }
.perm-toggle-btn.active-default { background: var(--bg-secondary); color: var(--text-primary); }
.perm-custom-list { display: flex; flex-direction: column; gap: 6px; }
.perm-custom-row { display: flex; align-items: center; gap: 8px; }
.perm-custom-tag { flex: 1; padding: 5px 10px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; font-family: var(--font-mono); color: var(--text-primary); }
.perm-custom-tag.deny-tag { border-color: var(--red); color: var(--red); background: var(--red-bg); }
.perm-custom-input { flex: 1; padding: 5px 10px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 12px; font-family: var(--font-mono); color: var(--text-primary); outline: none; }
.perm-custom-input:focus { border-color: var(--border-light); }
.perm-save-bar { position: sticky; bottom: 0; background: var(--bg-secondary); border-top: 1px solid var(--border); padding: 12px 0 4px; display: flex; align-items: center; gap: 10px; margin-top: 12px; }
.perm-note { font-size: 11px; color: var(--text-muted); flex: 1; }

/* ─── Utilities ─────────────────────────────────────────────────────────── */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-muted); gap: 10px; text-align: center; padding: 40px; }
.empty-state svg { width: 48px; height: 48px; opacity: 0.3; }
.empty-state h2 { font-size: 16px; color: var(--text-secondary); }
.empty-state p { font-size: 13px; max-width: 400px; }

.loading { display: flex; align-items: center; justify-content: center; padding: 40px; color: var(--text-muted); }
.spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }

.toast-container { position: fixed; bottom: 16px; right: 16px; z-index: 1000; display: flex; flex-direction: column; gap: 6px; }
.toast { padding: 8px 14px; border-radius: var(--radius-sm); background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-primary); font-size: 12px; box-shadow: var(--shadow); animation: slideInRight 0.3s ease; display: flex; align-items: center; gap: 6px; }
.toast.success { border-color: var(--green); }
.toast.error { border-color: var(--red); }
.toast.info { border-color: var(--blue); }
@keyframes slideInRight { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }

.confirm-inline { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--yellow); }

.theme-toggle { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
.theme-toggle:hover { background: var(--border); color: var(--text-primary); }

::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
</style>
</head>
<body>

<div class="app">
  <header class="header">
    <div class="header-left">
      <div class="brand" onclick="app.switchTab('sessions');app.showOverview();" title="Conductor">
        <div class="brand-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="4" y1="20" x2="16" y2="8"/>
            <circle cx="18.5" cy="5.5" r="2.5" fill="currentColor" stroke="none"/>
          </svg>
        </div>
        <div class="brand-name">Conductor</div>
      </div>
    </div>
    <nav class="header-nav">
      <button class="header-nav-btn active" id="navSessions" onclick="app.switchTab('sessions')">Sessions</button>
      <button class="header-nav-btn" id="navAnalytics" onclick="app.switchTab('analytics')">Analytics</button>
      <button class="header-nav-btn" id="navPermissions" onclick="app.switchTab('permissions')">Permissions</button>
    </nav>
    <div class="header-right">
      <div class="stats" id="globalStats"></div>
      <div class="cost-ticker" id="costTicker" title="Total tokens consumed across all sessions today (input + output + cache). Resets at midnight.">0 tokens today</div>
      <button class="theme-toggle" id="themeToggle" onclick="app.toggleTheme()" title="Toggle light/dark mode">
        <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div class="connection-status" id="connectionStatus" title="Disconnected"></div>
      <button class="btn" onclick="app.refresh()">Refresh</button>
      <button class="btn" id="restartBtn" onclick="app.restartServer()" title="Restart the dashboard server (LaunchAgent will auto-relaunch it)">Restart Server</button>
    </div>
  </header>

  <aside class="sidebar">
    <input type="text" class="search-box" placeholder="Search..." id="searchInput" oninput="app.filterSidebar(this.value)">
    <div class="project-list" id="projectList">
      <div class="loading"><div class="spinner"></div>Loading...</div>
    </div>
  </aside>

  <main class="main" id="mainPanel">
    <div class="loading"><div class="spinner"></div>Loading...</div>
  </main>
</div>

<!-- Inject Prompt Modal -->
<div class="modal-overlay" id="injectModal">
  <div class="modal">
    <div class="modal-title">Inject Prompt to Agent</div>
    <textarea id="injectPromptText" placeholder="Type a message to send to the agent..."></textarea>
    <div class="modal-actions">
      <button class="btn" onclick="app.closeInjectModal()">Cancel</button>
      <button class="btn btn-primary" onclick="app.submitInjectPrompt()">Send to Agent</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
class Dashboard {
  constructor() {
    this.projects = [];
    this.selectedSession = null;
    this.selectedProject = null;
    this.expandedProjects = new Set();
    this.ws = null;
    this.wsReconnectTimer = null;
    this.pollTimer = null;
    this.searchFilter = '';
    this.currentTab = 'sessions';
    this.injectSessionId = null;
    this.statusFilter = 'all';
    this.sortBy = 'default';
    this.viewMode = localStorage.getItem('dashboardViewMode') || 'grid';
    this.theme = localStorage.getItem('conductorTheme') || 'dark';
    this._notifiedSessions = new Set();
    this._pendingApprovals = {}; // sessionId -> approvals[]
  }

  async init() {
    // Apply saved theme before first render
    document.documentElement.setAttribute('data-theme', this.theme);
    this._updateThemeIcon();
    this._requestNotificationPermission();
    this.connectWebSocket();
    await this.loadProjects();
    this.showOverview();
    this.startPolling();
    this.loadTotalCost();
  }

  // ─── WebSocket ──────────────────────────────────────────────────────────
  connectWebSocket() {
    const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
    this.ws = new WebSocket(`${protocol}//${location.host}`);
    this.ws.onopen = () => {
      document.getElementById('connectionStatus').classList.add('connected');
      document.getElementById('connectionStatus').title = 'Connected';
    };
    this.ws.onclose = () => {
      document.getElementById('connectionStatus').classList.remove('connected');
      document.getElementById('connectionStatus').title = 'Disconnected';
      this.wsReconnectTimer = setTimeout(() => this.connectWebSocket(), 3000);
    };
    this.ws.onmessage = (e) => { try { this.handleWSMessage(JSON.parse(e.data)); } catch {} };
  }

  handleWSMessage(data) {
    switch (data.type) {
      case 'session:update':
      case 'session:new':
      case 'session:removed':
        if (this.selectedSession === data.sessionId) this.loadSessionDetail(data.sessionId);
        this.loadProjects();
        if (data.type === 'session:new') this.showToast('New session detected', 'info');
        break;
      case 'approval:pending':
        this._pendingApprovals[data.sessionId] = data.approvals || [];
        this.showApprovalBanner(data.sessionId, data.approvals);
        if (this.selectedSession === data.sessionId) this.loadSessionDetail(data.sessionId);
        this.loadProjects();
        break;
      case 'approval:resolved':
        delete this._pendingApprovals[data.sessionId];
        this.hideApprovalBanner(data.sessionId);
        this.showToast(`Tool ${data.action}`, 'success');
        if (this.selectedSession === data.sessionId) this.loadSessionDetail(data.sessionId);
        break;
      case 'session:injected': this.showToast('Prompt injected', 'success'); break;
      case 'session:paused': this.showToast('Agent paused', 'info'); break;
      case 'session:resumed': this.showToast('Agent resumed', 'success'); break;
      case 'session:killed': this.showToast('Agent terminated', 'info'); this.loadProjects(); break;
      case 'git:committed': this.showToast('Changes committed', 'success'); break;
      case 'git:pushed': this.showToast('Pushed to remote', 'success'); break;
      case 'deploy:started': this.showToast('Deploy started...', 'info'); break;
      case 'deploy:completed': this.showToast(`Deployed: ${data.url || 'success'}`, 'success'); break;
      case 'deploy:failed': this.showToast(`Deploy failed: ${data.error}`, 'error'); break;
    }
  }

  // ─── API ────────────────────────────────────────────────────────────────
  async fetchJSON(url) { const r = await fetch(url); if (!r.ok) throw new Error(`HTTP ${r.status}`); return r.json(); }

  async postJSON(url, body = {}) {
    const r = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    return r.json();
  }

  async loadProjects() {
    try {
      const { projects } = await this.fetchJSON('/api/projects');
      this.projects = projects;
      if (this.currentTab === 'sessions') this.renderSidebar();
      this.updateGlobalStats();
    } catch (err) { console.error(err); }
  }

  async loadProjectSessions(dirName) {
    try { return (await this.fetchJSON(`/api/projects/${encodeURIComponent(dirName)}/sessions`)).sessions; }
    catch { return []; }
  }

  async loadSessionDetail(sessionId) {
    try {
      const data = await this.fetchJSON(`/api/sessions/${sessionId}`);
      this.renderSessionDetail(data);
    } catch (err) {
      document.getElementById('mainPanel').innerHTML = `<div class="empty-state"><h2>Error</h2><p>${err.message}</p></div>`;
    }
  }

  async loadTotalCost() {
    try {
      const today = new Date().toISOString().slice(0, 10);
      const data = await this.fetchJSON(`/api/analytics/filtered?start=${today}&end=${today}`);
      const tokens = data.tokens || data.totalTokens || 0;
      document.getElementById('costTicker').textContent = `${this.formatNum(tokens)} tokens today`;
    } catch {}
  }

  // ─── Server Control ─────────────────────────────────────────────────────
  async restartServer() {
    const btn = document.getElementById('restartBtn');
    btn.textContent = 'Restarting…';
    btn.disabled = true;
    try {
      await this.postJSON('/api/server/restart');
    } catch {}
    // Poll until server is back up
    const poll = setInterval(async () => {
      try {
        await fetch('/api/projects');
        clearInterval(poll);
        btn.textContent = 'Restart Server';
        btn.disabled = false;
        this.showToast('Server restarted', 'success');
        this.refresh();
      } catch {}
    }, 800);
  }

  // ─── Agent Control ──────────────────────────────────────────────────────
  async sendApproval(sessionId) {
    const data = await this.postJSON(`/api/sessions/${sessionId}/approve`);
    if (data.success) {
      const via = data.method ? ` via ${data.method}` : '';
      this.showToast(`✓ Approved${via}`, 'success');
      this.hideApprovalBanner(sessionId);
      setTimeout(() => this.loadSessionDetail(sessionId), 800);
    } else {
      this.showToast(data.error || 'Approval failed', 'error');
    }
  }

  async sendDenial(sessionId) {
    const data = await this.postJSON(`/api/sessions/${sessionId}/deny`);
    if (data.success) {
      const via = data.method ? ` via ${data.method}` : '';
      this.showToast(`✗ Denied${via}`, 'info');
      this.hideApprovalBanner(sessionId);
      setTimeout(() => this.loadSessionDetail(sessionId), 800);
    } else {
      this.showToast(data.error || 'Denial failed', 'error');
    }
  }

  async pauseAgent(sessionId) {
    const data = await this.postJSON(`/api/sessions/${sessionId}/pause`);
    data.success ? this.showToast('Agent paused', 'info') : this.showToast(data.error, 'error');
  }

  async resumeAgent(sessionId) {
    const data = await this.postJSON(`/api/sessions/${sessionId}/resume`);
    data.success ? this.showToast('Agent resumed', 'success') : this.showToast(data.error, 'error');
  }

  async killAgent(sessionId) {
    if (!confirm('Terminate this agent? This will end the Claude Code session.')) return;
    const data = await this.postJSON(`/api/sessions/${sessionId}/kill`);
    data.success ? this.showToast('Agent terminated', 'info') : this.showToast(data.error, 'error');
    setTimeout(() => { this.loadProjects(); this.loadSessionDetail(sessionId); }, 1000);
  }

  openInjectModal(sessionId) {
    this.injectSessionId = sessionId;
    document.getElementById('injectModal').classList.add('visible');
    document.getElementById('injectPromptText').focus();
  }

  closeInjectModal() {
    document.getElementById('injectModal').classList.remove('visible');
    document.getElementById('injectPromptText').value = '';
    this.injectSessionId = null;
  }

  async submitInjectPrompt() {
    const prompt = document.getElementById('injectPromptText').value.trim();
    if (!prompt || !this.injectSessionId) return;
    const data = await this.postJSON(`/api/sessions/${this.injectSessionId}/inject`, { prompt });
    this.closeInjectModal();
    data.success ? this.showToast('Prompt sent', 'success') : this.showToast(data.error, 'error');
  }

  // ─── Git Operations ─────────────────────────────────────────────────────
  async loadGitStatus(projectDirName) {
    try { return await this.fetchJSON(`/api/projects/${encodeURIComponent(projectDirName)}/git/status`); }
    catch { return { isGitRepo: false }; }
  }

  async loadGitLog(projectDirName) {
    try { return await this.fetchJSON(`/api/projects/${encodeURIComponent(projectDirName)}/git/log`); }
    catch { return { commits: [] }; }
  }

  async gitCommit(projectDirName) {
    const input = document.getElementById('commitMessage');
    const msg = input?.value?.trim();
    if (!msg) { this.showToast('Enter a commit message', 'error'); return; }
    const data = await this.postJSON(`/api/projects/${encodeURIComponent(projectDirName)}/git/commit`, { message: msg });
    if (data.success) { input.value = ''; this.showToast('Committed', 'success'); this.refreshGitPanel(projectDirName); }
    else this.showToast(data.error, 'error');
  }

  async gitPush(projectDirName) {
    if (!confirm('Push to remote?')) return;
    this.showToast('Pushing...', 'info');
    const data = await this.postJSON(`/api/projects/${encodeURIComponent(projectDirName)}/git/push`);
    data.success ? this.showToast('Pushed', 'success') : this.showToast(data.error, 'error');
  }

  async refreshGitPanel(projectDirName) {
    const [git, log] = await Promise.all([this.loadGitStatus(projectDirName), this.loadGitLog(projectDirName)]);
    const el = document.getElementById('gitPanelBody');
    if (el) el.innerHTML = this.renderGitPanelContent(git, log, projectDirName);
  }

  // ─── Deploy ─────────────────────────────────────────────────────────────
  async deploy(projectDirName) {
    if (!confirm('Deploy to Netlify production?')) return;
    this.showToast('Starting deploy...', 'info');
    await this.postJSON(`/api/projects/${encodeURIComponent(projectDirName)}/deploy`);
  }

  // ─── Global Stats ───────────────────────────────────────────────────────
  async updateGlobalStats() {
    try {
      const data = await this.fetchJSON('/api/overview');
      document.getElementById('globalStats').innerHTML = `
        <div class="stat"><span class="stat-dot active"></span><span class="stat-count">${data.activeSessions}</span> Active</div>
        <div class="stat"><span class="stat-dot waiting"></span><span class="stat-count">${data.waitingSessions}</span> Waiting</div>
        <div class="stat"><span class="stat-dot completed"></span><span class="stat-count">${data.completedSessions}</span> Done</div>`;
      if (!this.selectedSession && this.currentTab === 'sessions') this.renderOverview(data);
      this._checkWaitingNotifications(data.allSessions || []);
    } catch {}
  }

  _requestNotificationPermission() {
    if (!('Notification' in window) || Notification.permission !== 'default') return;
    // Defer the prompt until the user has been on the page a moment
    setTimeout(() => {
      if (Notification.permission === 'default') Notification.requestPermission();
    }, 5000);
  }

  _checkWaitingNotifications(sessions) {
    if (!('Notification' in window) || Notification.permission !== 'granted') return;
    sessions.forEach(s => {
      if (s.status === 'waiting_for_approval' && !this._notifiedSessions.has(s.sessionId)) {
        this._notifiedSessions.add(s.sessionId);
        const n = new Notification('Conductor — Approval Needed', {
          body: `${s.project || s.projectDir} is waiting for your input`,
          tag: s.sessionId,
          requireInteraction: true
        });
        n.onclick = () => { window.focus(); this.selectSession(s.sessionId, s.projectDir); n.close(); };
      }
      // Remove from notified set once no longer waiting (so it notifies again if it waits again)
      if (s.status !== 'waiting_for_approval') this._notifiedSessions.delete(s.sessionId);
    });
  }

  // ─── Approval Banner ────────────────────────────────────────────────────

  riskBadge(level) {
    const labels = { low: '🟢 Low', medium: '🟡 Medium', high: '🔴 High', critical: '⛔ Critical' };
    return `<span class="risk-badge ${level}">${labels[level] || level}</span>`;
  }

  showApprovalBanner(sessionId, approvals) {
    if (!approvals || approvals.length === 0) return;
    // Only show banner if this session is currently selected
    const panel = document.getElementById('mainPanel');
    if (!panel || this.selectedSession !== sessionId) return;
    this._renderApprovalBanner(panel, sessionId, approvals);
  }

  _renderApprovalBanner(panel, sessionId, approvals) {
    document.querySelectorAll('.approval-banner-wrap').forEach(e => e.remove());
    const wrap = document.createElement('div');
    wrap.className = 'approval-banner-wrap';
    wrap.style.cssText = 'position:sticky;top:0;z-index:20;padding:14px 18px 0;';
    wrap.innerHTML = approvals.map((a, i) => {
      const risk = a.risk || { level: 'medium', plain: a.toolName, reason: '' };
      const cmd = this.escapeHtml((a.input?.command || a.input?.file_path || a.input?.description || JSON.stringify(a.input || {})).substring(0, 200));
      return `<div class="approval-banner">
        <div class="approval-banner-icon">⚠️</div>
        <div class="approval-banner-body">

          </div>

  hideApprovalBanner(sessionId) {
    document.querySelectorAll('.approval-banner-wrap').forEach(e => e.remove());
  }

  // ─── Tab Switching ──────────────────────────────────────────────────────
  switchTab(tab) {
    this.currentTab = tab;
    document.getElementById('navSessions').classList.toggle('active', tab === 'sessions');
    document.getElementById('navAnalytics').classList.toggle('active', tab === 'analytics');
    document.getElementById('navPermissions').classList.toggle('active', tab === 'permissions');
    this.selectedSession = null;
    this.selectedProject = null;
    if (tab === 'sessions') { this.renderSidebar(); this.showOverview(); }
    else if (tab === 'analytics') { this.showAnalytics(); }
    else if (tab === 'permissions') { this.showPermissions(); }
  }

  async showAnalytics() {
    const panel = document.getElementById('mainPanel');
    panel.innerHTML = '<div class="loading"><div class="spinner"></div>Loading analytics...</div>';

    try {
      const today = new Date().toISOString().slice(0, 10);
      const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString().slice(0, 10);

      const [allTime, week, insights] = await Promise.all([
        this.fetchJSON('/api/analytics'),
        this.fetchJSON(`/api/analytics/filtered?start=${weekAgo}&end=${today}`),
        this.fetchJSON('/api/analytics/insights')
      ]);

      const weekSessions = insights.sessionsByDay.filter(d => d.date >= weekAgo).reduce((s, d) => s + d.count, 0);
      const weekMessages = week.projects?.reduce((s, p) => s + (p.messageCount || 0), 0) || 0;
      const cacheHit = insights.cacheStats.cacheHitRate || 0;

      // Activity bars (sessions per day, last 14)
      const maxDay = Math.max(...insights.sessionsByDay.map(d => d.count), 1);
      const activityBars = insights.sessionsByDay.map(d => `
        <div class="analytics-bar-row">
          <div class="analytics-bar-label" style="width:90px;">${d.date.slice(5)}</div>
          <div class="analytics-bar-track">
            <div class="analytics-bar-fill" style="width:${(d.count/maxDay*100).toFixed(1)}%;background:var(--blue);">${d.count > 0 ? d.count : ''}</div>
          </div>
        </div>`).join('');

      // Tokens by project bars
      const maxTok = Math.max(...allTime.projects.map(p => p.totalTokens), 1);
      const projectBars = allTime.projects.filter(p => p.totalTokens > 0).map(p => `
        <div class="analytics-bar-row">
          <div class="analytics-bar-label">${this.escapeHtml(p.name)}</div>
          <div class="analytics-bar-track">
            <div class="analytics-bar-fill" style="width:${(p.totalTokens/maxTok*100).toFixed(1)}%">${p.sessionCount > 0 ? p.sessionCount + ' sess' : ''}</div>
          </div>
          <div class="analytics-bar-cost" style="color:var(--text-secondary);">${this.formatNum(p.totalTokens)}</div>
        </div>`).join('');

      // Cache breakdown bar
      const cs = insights.cacheStats;
      const pct = (n) => cs.total > 0 ? (n / cs.total * 100).toFixed(1) : '0';

      // Tool usage bars
      const maxTool = Math.max(...(insights.toolUsage.map(t => t.count)), 1);
      const toolBars = insights.toolUsage.map(t => `
        <div class="analytics-bar-row">
          <div class="analytics-bar-label" style="font-family:var(--font-mono);font-size:11px;">${this.escapeHtml(t.tool)}</div>
          <div class="analytics-bar-track">
            <div class="analytics-bar-fill" style="width:${(t.count/maxTool*100).toFixed(1)}%;background:var(--purple);">${t.count}</div>
          </div>
        </div>`).join('');

      // Model distribution
      const maxModel = Math.max(...(insights.modelTokens.map(m => m.tokens)), 1);
      const modelBars = insights.modelTokens.map(m => {
        const label = m.model.replace('claude-','').replace(/-latest$/,'');

        <div class="analytics-bar-row">
          <div class="analytics-bar-label" style="font-family:var(--font-mono);font-size:11px;">${this.escapeHtml(label)}</div>
          <div class="analytics-bar-track">
            <div class="analytics-bar-fill" style="width:${(m.tokens/maxModel*100).toFixed(1)}%;background:var(--green);">${this.formatNum(m.tokens)}</div>
          </div>
        </div>`;}).join('');

      panel.innerHTML = `
        <div class="analytics">
          <div class="overview-title">Analytics</div>

          <div class="analytics-summary">
            <div class="analytics-card">
              <div class="analytics-card-value" style="color:var(--blue);">${weekSessions}</div>
              <div class="analytics-card-label">Sessions This Week</div>
            </div>
            <div class="analytics-card">
              <div class="analytics-card-value" style="color:var(--purple);">${this.formatNum(allTime.totalTokens)}</div>
              <div class="analytics-card-label">All-Time Tokens</div>
            </div>
            <div class="analytics-card">
              <div class="analytics-card-value" style="color:${cacheHit >= 40 ? 'var(--green)' : 'var(--yellow)'};">${cacheHit}%</div>
              <div class="analytics-card-label">Cache Hit Rate</div>
            </div>
          </div>

          <div class="panel">
            <div class="panel-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
              <div class="panel-header-title">Session Activity — Last 14 Days</div>

            <div class="panel-body">
              <div class="analytics-bar-chart">${activityBars || '<div style="color:var(--text-muted);font-size:12px;">No data</div>'}</div>

              <div class="panel-header-title">Tokens by Project — All Time</div>
            </div>
            <div class="panel-body">
              <div class="analytics-bar-chart">${projectBars || '<div style="color:var(--text-muted);font-size:12px;">No data</div>'}</div>
            </div>
          </div>

          <div class="panel">
            <div class="panel-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
              <div class="panel-header-title">Cache Efficiency <span style="font-weight:400;color:var(--text-muted);font-size:10px;margin-left:6px;">— higher cache read % = more efficient</span></div>

            <div class="panel-body" style="display:flex;flex-direction:column;gap:10px;">

                <div style="width:${pct(cs.output)}%;background:var(--purple);transition:width 0.5s;" title="Output: ${this.formatNum(cs.output)} tokens"></div>
                <div style="width:${pct(cs.cacheWrite)}%;background:var(--yellow);transition:width 0.5s;" title="Cache write: ${this.formatNum(cs.cacheWrite)} tokens"></div>
              </div>
              <div style="display:flex;gap:16px;flex-wrap:wrap;font-size:11px;">
                <span style="color:var(--green);">■ Cache read ${pct(cs.cacheRead)}%</span>
                <span style="color:var(--blue);">■ Input ${pct(cs.input)}%</span>
                <span style="color:var(--purple);">■ Output ${pct(cs.output)}%</span>
                <span style="color:var(--yellow);">■ Cache write ${pct(cs.cacheWrite)}%</span>
              </div>
              <div style="font-size:11px;color:var(--text-muted);">Total: ${this.formatNum(cs.total)} tokens scanned across recent sessions</div>
            </div>
          </div>

          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="panel">
              <div class="panel-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
                <div class="panel-header-title">Tool Usage</div>
              </div>
              <div class="panel-body">
                <div class="analytics-bar-chart">${toolBars || '<div style="color:var(--text-muted);font-size:12px;">No data</div>'}</div>
              </div>
            </div>
            <div class="panel">
              <div class="panel-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
                <div class="panel-header-title">Model Distribution</div>
              </div>
              <div class="panel-body">
                <div class="analytics-bar-chart">${modelBars || '<div style="color:var(--text-muted);font-size:12px;">No data</div>'}</div>
              </div>
            </div>
