        </div>`;
    } catch (err) {
      panel.innerHTML = `<div class="empty-state"><h2>Error</h2><p>${err.message}</p></div>`;
    }
  }

  // ─── Permissions ────────────────────────────────────────────────────────
  async showPermissions() {
    const panel = document.getElementById('mainPanel');
    panel.innerHTML = '<div class="loading"><div class="spinner"></div>Loading...</div>';

    const data = await this.fetchJSON('/api/permissions');
    // Working copies (arrays of pattern strings)
    this._permAllow = [...(data.allow || [])];
    this._permDeny  = [...(data.deny  || [])];

    const TOOLS = [
      { name: 'Bash',        pattern: 'Bash(*)',        desc: 'Run shell commands' },
      { name: 'Edit',        pattern: 'Edit(*)',        desc: 'Edit existing files' },
      { name: 'Write',       pattern: 'Write(*)',       desc: 'Create or overwrite files' },
      { name: 'Read',        pattern: 'Read(*)',        desc: 'Read file contents' },
      { name: 'Glob',        pattern: 'Glob(*)',        desc: 'Find files by pattern' },
      { name: 'Grep',        pattern: 'Grep(*)',        desc: 'Search file contents' },
      { name: 'WebFetch',    pattern: 'WebFetch(*)',    desc: 'Fetch web URLs' },
      { name: 'WebSearch',   pattern: 'WebSearch(*)',   desc: 'Search the web' },
      { name: 'Task',        pattern: 'Task(*)',        desc: 'Spawn sub-agents' },
      { name: 'TodoWrite',   pattern: 'TodoWrite(*)',   desc: 'Write task lists' },
      { name: 'mcp__*',      pattern: 'mcp__*(*)',      desc: 'All MCP server tools' },
      { name: 'NotebookEdit',pattern: 'NotebookEdit(*)',desc: 'Edit Jupyter notebooks' },
    ];

    const renderCards = () => TOOLS.map(t => {
      const isAllow = this._permAllow.includes(t.pattern);
      const isDeny  = this._permDeny.includes(t.pattern);
      const state   = isAllow ? 'allow' : isDeny ? 'deny' : 'default';
      return `<div class="perm-card ${isAllow ? 'is-allow' : isDeny ? 'is-deny' : ''}">
        <div class="perm-card-header">
          <span class="perm-card-name">${this.escapeHtml(t.name)}</span>
          <div class="perm-toggle">
            <button class="perm-toggle-btn ${state==='allow'?'active-allow':''}" onclick="app.setPermTool('${t.pattern}','allow')">Allow</button>
            <button class="perm-toggle-btn ${state==='default'?'active-default':''}" onclick="app.setPermTool('${t.pattern}','default')">Ask</button>
            <button class="perm-toggle-btn ${state==='deny'?'active-deny':''}" onclick="app.setPermTool('${t.pattern}','deny')">Deny</button>
          </div>
        </div>
        <div class="perm-card-desc">${this.escapeHtml(t.desc)}</div>
      </div>`;
    }).join('');

    const knownPatterns = new Set(TOOLS.map(t => t.pattern));
    const customAllow = this._permAllow.filter(p => !knownPatterns.has(p));
    const customDeny  = this._permDeny.filter(p => !knownPatterns.has(p));

    const renderCustom = () => `
      <div class="perm-custom-list" id="customAllowList">
        ${customAllow.map((p,i) => `<div class="perm-custom-row">
          <span class="perm-custom-tag">${this.escapeHtml(p)}</span>
          <button class="btn btn-sm btn-danger" onclick="app.removeCustomPerm('allow',${i})">✕</button>
        </div>`).join('')}
        <div class="perm-custom-row">
          <input class="perm-custom-input" id="newAllowInput" placeholder="e.g. Bash(git *)" onkeydown="if(event.key==='Enter')app.addCustomPerm('allow')">
          <button class="btn btn-sm btn-approve" onclick="app.addCustomPerm('allow')">Add</button>
        </div>
      </div>
      <div style="margin-top:12px;margin-bottom:8px;font-size:12px;font-weight:600;color:var(--red);">Custom Deny Rules</div>
      <div class="perm-custom-list" id="customDenyList">
        ${customDeny.map((p,i) => `<div class="perm-custom-row">
          <span class="perm-custom-tag deny-tag">${this.escapeHtml(p)}</span>
          <button class="btn btn-sm btn-danger" onclick="app.removeCustomPerm('deny',${i})">✕</button>
        </div>`).join('')}
        <div class="perm-custom-row">
          <input class="perm-custom-input" id="newDenyInput" placeholder="e.g. Bash(rm -rf *)" onkeydown="if(event.key==='Enter')app.addCustomPerm('deny')">
          <button class="btn btn-sm btn-danger" onclick="app.addCustomPerm('deny')">Add</button>
        </div>
      </div>`;

    panel.innerHTML = `<div style="max-width:900px;">
      <div style="margin-bottom:20px;">
        <div style="font-size:20px;font-weight:700;margin-bottom:6px;">Tool Permissions</div>
        <div style="font-size:13px;color:var(--text-muted);max-width:600px;">Controls what Claude can do without asking. Changes are saved to <code style="background:var(--bg-tertiary);padding:1px 5px;border-radius:3px;">~/.claude/settings.json</code> and take effect immediately in new sessions.</div>
      </div>
      <div class="perm-section">
        <div class="perm-section-title">Common Tools</div>
        <div class="perm-grid" id="permGrid">${renderCards()}</div>
      </div>
      <div class="perm-section">
        <div class="perm-section-title">Custom Allow Rules</div>
        <div style="font-size:12px;color:var(--text-muted);margin-bottom:10px;">Use <code style="background:var(--bg-tertiary);padding:1px 4px;border-radius:3px;">Tool(pattern)</code> format, e.g. <code style="background:var(--bg-tertiary);padding:1px 4px;border-radius:3px;">Bash(git *)</code> to allow only git commands.</div>
        <div id="customRulesSection">${renderCustom()}</div>
      </div>
      <div class="perm-save-bar">
        <span class="perm-note">Changes take effect in new Claude sessions. Running sessions are not affected.</span>
        <button class="btn btn-primary" onclick="app.savePermissions()">Save Permissions</button>
      </div>
    </div>`;

    this._renderPermGrid = renderCards;
    this._renderCustomRules = renderCustom;
  }

  setPermTool(pattern, state) {
    this._permAllow = this._permAllow.filter(p => p !== pattern);
    this._permDeny  = this._permDeny.filter(p => p !== pattern);
    if (state === 'allow') this._permAllow.push(pattern);
    if (state === 'deny')  this._permDeny.push(pattern);
    document.getElementById('permGrid').innerHTML = this._renderPermGrid();
  }

  addCustomPerm(type) {
    const input = document.getElementById(type === 'allow' ? 'newAllowInput' : 'newDenyInput');
    const val = input.value.trim();
    if (!val) return;
    if (type === 'allow' && !this._permAllow.includes(val)) this._permAllow.push(val);
    if (type === 'deny'  && !this._permDeny.includes(val))  this._permDeny.push(val);
    document.getElementById('customRulesSection').innerHTML = this._renderCustomRules();
  }

  removeCustomPerm(type, idx) {
    const knownPatterns = new Set([
      'Bash(*)','Edit(*)','Write(*)','Read(*)','Glob(*)','Grep(*)','WebFetch(*)','WebSearch(*)','Task(*)','TodoWrite(*)','mcp__*(*)','NotebookEdit(*)'
    ]);
    if (type === 'allow') {
      const custom = this._permAllow.filter(p => !knownPatterns.has(p));
      const toRemove = custom[idx];
      this._permAllow = this._permAllow.filter(p => p !== toRemove);
    } else {
      const custom = this._permDeny.filter(p => !knownPatterns.has(p));
      const toRemove = custom[idx];
      this._permDeny = this._permDeny.filter(p => p !== toRemove);
    }
    document.getElementById('customRulesSection').innerHTML = this._renderCustomRules();
  }

  async savePermissions() {
    const data = await this.postJSON('/api/permissions', { allow: this._permAllow, deny: this._permDeny });
    data.success ? this.showToast('Permissions saved', 'success') : this.showToast(data.error, 'error');
  }

  // ─── Rendering ──────────────────────────────────────────────────────────
  renderSidebar() {
    const container = document.getElementById('projectList');
    const filter = this.searchFilter.toLowerCase();

    if (!this.projects.length) {
      container.innerHTML = '<div class="empty-state" style="padding:20px;"><p style="font-size:12px;">No projects found</p></div>';
      return;
    }

    let html = '';
    for (const p of this.projects) {
      if (filter && !p.name.toLowerCase().includes(filter)) continue;
      const expanded = this.expandedProjects.has(p.dirName);
      html += `<div class="project-item ${expanded ? 'expanded' : ''}" data-project="${p.dirName}">
        <div class="project-header" onclick="app.toggleProject('${p.dirName}')">
          <svg class="project-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <span class="project-name" title="${p.fullPath}">${this.escapeHtml(p.name)}</span>
          <span class="project-badge">${p.sessionCount}</span>
        </div>
        <div class="session-list" id="sessions-${p.dirName}">${expanded ? '<div class="loading" style="padding:6px 34px;"><div class="spinner"></div></div>' : ''}</div>
      </div>`;
    }
    container.innerHTML = html;
    for (const d of this.expandedProjects) this.loadAndRenderSessions(d);
  }

  async loadAndRenderSessions(dirName) {
    const sessions = await this.loadProjectSessions(dirName);
    const container = document.getElementById(`sessions-${dirName}`);
    if (!container) return;
    const filter = this.searchFilter.toLowerCase();

    let html = '';
    for (const s of sessions) {
      const name = s.slug || s.sessionId.substring(0, 8);
      if (filter && !name.toLowerCase().includes(filter)) continue;
      const sel = this.selectedSession === s.sessionId;
      html += `<div class="session-item ${sel ? 'selected' : ''}" onclick="app.selectSession('${s.sessionId}','${dirName}')" title="${s.statusDetail}">
        <span class="session-status-dot ${s.status}"></span>
        <div class="session-info">
          <div class="session-name">${this.escapeHtml(name)}${(s.pendingApprovals?.length || 0) > 0 ? ` <span style="color:var(--yellow)">(${s.pendingApprovals.length})</span>` : ''}</div>
          <div class="session-meta">${this.timeAgo(s.lastModified)}</div>
        </div>
        <span style="font-family:var(--font-mono);font-size:11px;color:var(--green);font-weight:600;flex-shrink:0;" title="Total tokens">${this.formatNum(s.totalTokens || 0)} tok</span>
      </div>`;
    }
    container.innerHTML = html || '<div style="padding:6px 34px;font-size:11px;color:var(--text-muted);">No sessions</div>';
  }

  toggleProject(d) { this.expandedProjects.has(d) ? this.expandedProjects.delete(d) : this.expandedProjects.add(d); this.renderSidebar(); }

  async selectSession(sessionId, projectDir) {
    this.selectedSession = sessionId;
    this.selectedProject = projectDir;
    this.currentTab = 'sessions';
    this.renderSidebar();
    document.getElementById('mainPanel').innerHTML = '<div class="loading"><div class="spinner"></div></div>';
    await this.loadSessionDetail(sessionId);
  }

  async renderSessionDetail(data) {
    const panel = document.getElementById('mainPanel');
    const isRunning = data.status !== 'completed';
    const projectDir = this.selectedProject;

    // Build control bar
    const controlBar = isRunning ? `
      <div class="control-bar">
        <span class="control-bar-label">Agent Control</span>
        <button class="btn btn-primary" onclick="app.openInjectModal('${data.sessionId}')">Inject Prompt</button>
        <button class="btn btn-warning" onclick="app.pauseAgent('${data.sessionId}')">Pause</button>
        <button class="btn btn-approve" onclick="app.resumeAgent('${data.sessionId}')">Resume</button>
        <button class="btn btn-danger" onclick="app.killAgent('${data.sessionId}')">Kill</button>
      </div>` : '';

    // Build approvals
    let approvalsHtml = '';
    if (data.pendingApprovals?.length) {
      // Render approval banner into main panel after load
      setTimeout(() => this._renderApprovalBanner(document.getElementById('mainPanel'), data.sessionId, data.pendingApprovals), 0);
      approvalsHtml = `<div class="approval-section">
        <div class="approval-section-title">⏳ Waiting for Approval (${data.pendingApprovals.length})</div>
        ${data.pendingApprovals.map(a => {
          const risk = a.risk || { level: 'medium', plain: a.toolName, reason: '' };
          const inputSummary = this.formatApprovalInput(a.toolName, a.input);
          return `<div class="approval-card">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">
              <div class="approval-tool-name" style="margin:0;">${this.escapeHtml(a.toolName)}</div>
              ${this.riskBadge(risk.level)}
            </div>
            <div class="approval-plain" style="font-size:12px;color:var(--text-primary);margin-bottom:4px;font-weight:500;">${this.escapeHtml(risk.plain)}</div>
            ${risk.reason ? `<div class="approval-input" style="margin-bottom:8px;">${this.escapeHtml(risk.reason)}</div>` : ''}
            ${inputSummary ? `<div class="approval-input">${this.escapeHtml(inputSummary)}</div>` : ''}
            <div class="approval-actions">
              <button class="btn btn-approve" onclick="app.sendApproval('${data.sessionId}')">✓ Approve</button>
              <button class="btn btn-deny" onclick="app.sendDenial('${data.sessionId}')">✗ Deny</button>
            </div>
          </div>`;
        }).join('')}
      </div>`;
    }

    // Build token stats
    const ts = data.tokenStats;
    const tokenHtml = ts ? `
      <div class="token-panel">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
          <div class="token-panel-title" style="margin-bottom:0;">Session Token Value <span style="font-size:10px;font-weight:400;color:var(--text-muted);">at API list prices</span></div>
          <div style="font-family:var(--font-mono);font-size:28px;font-weight:800;color:var(--green);">~$${ts.estimated_cost.toFixed(2)}</div>
        </div>
        <div class="token-grid">
          <div class="token-stat"><div class="token-stat-value" style="color:var(--blue)">${this.formatNum(ts.input_tokens)}</div><div class="token-stat-label">Input</div></div>
          <div class="token-stat"><div class="token-stat-value" style="color:var(--purple)">${this.formatNum(ts.output_tokens)}</div><div class="token-stat-label">Output</div></div>
          <div class="token-stat"><div class="token-stat-value" style="color:var(--orange)">${this.formatNum(ts.cache_write_tokens)}</div><div class="token-stat-label">Cache Write</div></div>
          <div class="token-stat"><div class="token-stat-value" style="color:var(--green)">${this.formatNum(ts.cache_read_tokens)}</div><div class="token-stat-label">Cache Read</div></div>
        </div>
        <div class="token-bar">
          ${this.renderTokenBar(ts)}
        </div>
      </div>` : '';

    // Build messages
    const msgsHtml = data.messages ? data.messages.map(m => this.renderMessage(m)).join('') : '';

    panel.innerHTML = `
      <div class="session-detail">
        <div class="detail-header">
          <div>
            <div class="detail-title-row">
              <button class="btn btn-sm" onclick="app.showOverview()">&#8592;</button>
              <h1 class="detail-title">${this.escapeHtml(data.slug || data.sessionId.substring(0, 12))}</h1>
              <span class="status-badge ${data.status}">${this.formatStatus(data.status)}</span>
            </div>
            <div class="detail-meta">
              <div class="detail-meta-item">${this.escapeHtml(data.cwd || '')}</div>
              ${data.startedAt ? `<div class="detail-meta-item">Started ${this.timeAgo(data.startedAt)}</div>` : ''}
              <div class="detail-meta-item">${data.entrypoint === 'claude-desktop' ? 'Desktop' : 'CLI'}</div>
              ${data.version ? `<div class="detail-meta-item">v${data.version}</div>` : ''}
              ${data.gitBranch ? `<div class="detail-meta-item">Branch: ${this.escapeHtml(data.gitBranch)}</div>` : ''}
              ${data.pid ? `<div class="detail-meta-item">PID: ${data.pid}</div>` : ''}
            </div>
          </div>
        </div>
        ${controlBar}
        ${approvalsHtml}
        ${tokenHtml}
        <div id="gitDeployContainer"></div>
        <div class="messages-section">
          <div class="messages-header">
            <span>Messages (${data.messages?.length || 0})</span>
            <button class="btn btn-sm" onclick="app.loadSessionDetail('${data.sessionId}')">Refresh</button>
          </div>
          <div class="messages-feed" id="messagesFeed">${msgsHtml || '<div style="padding:20px;text-align:center;color:var(--text-muted);">No messages</div>'}</div>
        </div>
      </div>`;

    const feed = document.getElementById('messagesFeed');
    if (feed) feed.scrollTop = feed.scrollHeight;

    // Load git + deploy panels async
    if (projectDir) this.loadGitDeployPanels(projectDir);
  }

  async loadGitDeployPanels(projectDir) {
    const container = document.getElementById('gitDeployContainer');
    if (!container) return;

    const [git, log] = await Promise.all([this.loadGitStatus(projectDir), this.loadGitLog(projectDir)]);

    let html = '';
    if (git.isGitRepo) {
      html += `<div class="panel">
        <div class="panel-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
          <div class="panel-header-title">Git ${git.branch ? `(${this.escapeHtml(git.branch)})` : ''} ${git.changedCount ? `- ${git.changedCount} changed` : '- clean'}</div>
          <span style="font-size:11px;color:var(--text-muted);">${git.commitsAhead ? `${git.commitsAhead} ahead` : ''}</span>
        </div>
        <div class="panel-body" id="gitPanelBody">${this.renderGitPanelContent(git, log, projectDir)}</div>
      </div>`;
    }

    html += `<div class="panel" style="margin-top:10px;">
      <div class="panel-header" onclick="this.nextElementSibling.classList.toggle('hidden')">
        <div class="panel-header-title">Deploy (Netlify)</div>
      </div>
      <div class="panel-body hidden">
        <div class="deploy-actions">
          <button class="btn btn-primary" onclick="app.deploy('${projectDir}')">Deploy to Production</button>
        </div>
      </div>
    </div>`;

    container.innerHTML = html;
  }

  renderGitPanelContent(git, log, projectDir) {
    let html = '';
    if (git.changedCount > 0) {
      html += `<div class="git-file-list">${git.files.map(f =>
        `<div class="git-file"><span class="git-file-status ${f.status}">${f.status}</span><span>${this.escapeHtml(f.file)}</span></div>`
      ).join('')}</div>
      <div class="git-actions">
        <input class="git-input" id="commitMessage" placeholder="Commit message..." onkeydown="if(event.key==='Enter')app.gitCommit('${projectDir}')">
        <button class="btn btn-primary" onclick="app.gitCommit('${projectDir}')">Commit</button>
        <button class="btn" onclick="app.gitPush('${projectDir}')">Push</button>
      </div>`;
    } else {
      html += '<div style="font-size:12px;color:var(--text-muted);margin-bottom:8px;">Working tree clean</div>';
      html += `<button class="btn" onclick="app.gitPush('${projectDir}')">Push</button>`;
    }

    if (log.commits?.length) {
      html += `<div class="git-log">${log.commits.map(c =>
        `<div class="git-commit"><span class="git-commit-hash">${c.hash?.substring(0,7) || ''}</span><span class="git-commit-msg">${this.escapeHtml(c.message || '')}</span><span class="git-commit-time">${this.escapeHtml(c.time || '')}</span></div>`
      ).join('')}</div>`;
    }
    return html;
  }

  renderMessage(msg) {
    let roleClass = msg.type, roleLabel = msg.type === 'assistant' ? 'Claude' : msg.type === 'user' ? 'You' : msg.type === 'system' ? 'System' : msg.type;
    if (msg.type === 'tool_result') { roleClass = msg.isError ? 'tool_result error' : 'tool_result'; roleLabel = msg.isError ? 'Error' : 'Result'; }

    let content = '';
    if (msg.text) {
      const trunc = msg.text.length > 400;
      content = `<div class="message-text" ${trunc ? 'style="cursor:pointer" onclick="this.classList.toggle(\'expanded\')"' : ''}>${this.escapeHtml(msg.text.substring(0, 400))}${trunc ? '...' : ''}</div>`;
      if (trunc) content += `<div class="message-expand" onclick="this.previousElementSibling.classList.toggle('expanded');this.textContent=this.textContent==='Show more'?'Show less':'Show more'">Show more</div>`;
    }
    if (msg.tools?.length) {
      content += `<div class="tool-use-list">${msg.tools.map(t =>
        `<div class="tool-tag"><span>${this.escapeHtml(t.name)}</span>${t.input ? `<span class="tool-tag-input">${this.escapeHtml(t.input)}</span>` : ''}</div>`
      ).join('')}</div>`;
    }

    return `<div class="message"><div class="message-header"><span class="message-role ${roleClass}">${roleLabel}</span><span class="message-time">${this.formatTime(msg.timestamp)}</span>${msg.model ? `<span style="font-size:10px;color:var(--text-muted)">${msg.model}</span>` : ''}</div>${content}</div>`;
  }

  renderTokenBar(ts) {
    const total = ts.input_tokens + ts.output_tokens + ts.cache_write_tokens + ts.cache_read_tokens;
    if (!total) return '';
    const pct = (v) => ((v / total) * 100).toFixed(1);
    return `<div class="token-bar-segment" style="width:${pct(ts.input_tokens)}%;background:var(--blue);" title="Input"></div>
      <div class="token-bar-segment" style="width:${pct(ts.output_tokens)}%;background:var(--purple);" title="Output"></div>
      <div class="token-bar-segment" style="width:${pct(ts.cache_write_tokens)}%;background:var(--orange);" title="Cache Write"></div>
      <div class="token-bar-segment" style="width:${pct(ts.cache_read_tokens)}%;background:var(--green);" title="Cache Read"></div>`;
  }

  async showOverview() {
    this.selectedSession = null;
    this.selectedProject = null;
    this.renderSidebar();
    try {
      const data = await this.fetchJSON('/api/overview');
      this.renderOverview(data);
    } catch (err) {
      document.getElementById('mainPanel').innerHTML = `<div class="empty-state"><h2>Error</h2><p>${err.message}</p></div>`;
    }
  }

  renderOverview(data) {
    if (this.selectedSession || this.currentTab !== 'sessions') return;
    const panel = document.getElementById('mainPanel');

    if (!data.allSessions.length) {
      panel.innerHTML = `<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" stroke-linecap="round" stroke-linejoin="round"/></svg><h2>No Sessions Found</h2><p>Start a Claude Code session to see it here.</p></div>`;
      return;
    }

    const isList = this.viewMode === 'list';

    // Apply status filter
    let filtered = data.allSessions.filter(s => {
      if (this.statusFilter === 'active') return ['active','processing','idle','paused'].includes(s.status);
      if (this.statusFilter === 'waiting') return s.status === 'waiting_for_approval';
      if (this.statusFilter === 'done') return s.status === 'completed';
      return true;
    });

    // Apply sort
    if (this.sortBy === 'cost') {
      filtered = [...filtered].sort((a, b) => (b.totalTokens || 0) - (a.totalTokens || 0));
    }

    const cards = filtered.map(s => `
      <div class="overview-card" onclick="app.selectSession('${s.sessionId}','${s.projectDirName}')">
        ${isList ? `<span class="session-status-dot ${s.status} list-dot" style="display:flex;align-self:center;grid-column:1;grid-row:1/3;"></span>` : ''}
        <div class="overview-card-header">
          <div class="overview-card-title">${isList ? '' : `<span class="session-status-dot ${s.status}"></span>`}${this.escapeHtml(s.projectName)}</div>
          <span style="font-family:var(--font-mono);font-size:${isList ? '12' : '14'}px;font-weight:700;color:var(--green);" title="Total tokens in this session">${this.formatNum(s.totalTokens || 0)} tok</span>
        </div>
        ${isList ? '' : `<div style="display:flex;align-items:center;justify-content:space-between;"><div class="overview-card-slug">${this.escapeHtml(s.slug || s.sessionId.substring(0, 8))}</div><span class="status-badge ${s.status}">${this.formatStatus(s.status)}</span></div>`}
        <div class="overview-card-summary">${this.escapeHtml(s.summary || '')}</div>
        ${s.pendingApprovals.length ? s.pendingApprovals.map(a => {
            const risk = a.risk || { level: 'medium', plain: a.toolName, reason: '' };
            const riskColors = { low: 'var(--green)', medium: 'var(--yellow)', high: 'var(--red)', critical: 'var(--red)' };
            const riskBg = { low: 'var(--green-bg)', medium: 'var(--yellow-bg)', high: 'var(--red-bg)', critical: 'var(--red-bg)' };
            const col = riskColors[risk.level] || 'var(--yellow)';
            const bg = riskBg[risk.level] || 'var(--yellow-bg)';
            return `<div class="${isList ? 'approval-inline' : ''}" style="margin-top:8px;padding:8px;background:${bg};border:1px solid ${col};border-radius:var(--radius-sm);" onclick="event.stopPropagation()">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
                <span style="font-size:11px;color:${col};font-weight:700;">⏳ ${this.escapeHtml(a.toolName)}</span>
                ${this.riskBadge(risk.level)}
              </div>
              <div style="font-size:11px;color:var(--text-primary);margin-bottom:6px;">${this.escapeHtml(risk.plain)}</div>
              <div style="display:flex;gap:6px;">
                <button class="btn btn-approve btn-sm" onclick="event.stopPropagation();app.sendApproval('${s.sessionId}')">✓ Approve</button>
                <button class="btn btn-deny btn-sm" onclick="event.stopPropagation();app.sendDenial('${s.sessionId}')">✗ Deny</button>
              </div>
            </div>`;
          }).join('') : ''}
        <div class="overview-card-footer">
          <span>${isList ? `<span class="status-badge ${s.status}" style="font-size:10px;">${this.formatStatus(s.status)}</span>` : (s.entrypoint === 'claude-desktop' ? 'Desktop' : 'CLI')}</span>
          <span>${this.timeAgo(s.lastModified || s.startedAt)}</span>
        </div>
      </div>`).join('');

    const sf = this.statusFilter;
    const allCount = data.allSessions.length;
    const activeCount = data.allSessions.filter(s => ['active','processing','waiting_for_approval','idle'].includes(s.status)).length;
    const waitingCount = data.allSessions.filter(s => s.status === 'waiting_for_approval').length;
    const doneCount = data.allSessions.filter(s => s.status === 'completed').length;

    panel.innerHTML = `
      <div class="overview">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;">
          <div style="display:flex;align-items:center;gap:10px;">
            <div class="overview-title">Sessions</div>
            <div class="status-filters">
              <button class="status-filter-btn ${sf==='all'?'active':''}" onclick="app.setStatusFilter('all')">All <span style="opacity:0.6;">${allCount}</span></button>
              <button class="status-filter-btn ${sf==='active'?'active':''}" onclick="app.setStatusFilter('active')">Active <span style="opacity:0.6;">${activeCount}</span></button>
              <button class="status-filter-btn f-waiting ${sf==='waiting'?'active':''}" onclick="app.setStatusFilter('waiting')">Waiting <span style="opacity:0.6;">${waitingCount}</span></button>
              <button class="status-filter-btn f-done ${sf==='done'?'active':''}" onclick="app.setStatusFilter('done')">Done <span style="opacity:0.6;">${doneCount}</span></button>
            </div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
          <button class="sort-btn ${this.sortBy==='cost'?'active':''}" onclick="app.setSortBy(app.sortBy==='cost'?'default':'cost')" title="Sort by token count">
            ${this.sortBy==='cost' ? '↓ Most tokens' : 'Sort by tokens'}
          </button>
          <div class="view-toggle">
            <button class="view-toggle-btn ${!isList ? 'active' : ''}" onclick="app.setViewMode('grid')" title="Grid view">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="0" y="0" width="6" height="6" rx="1"/><rect x="8" y="0" width="6" height="6" rx="1"/><rect x="0" y="8" width="6" height="6" rx="1"/><rect x="8" y="8" width="6" height="6" rx="1"/></svg>
            </button>
            <button class="view-toggle-btn ${isList ? 'active' : ''}" onclick="app.setViewMode('list')" title="List view">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="0" y="1" width="14" height="2" rx="1"/><rect x="0" y="6" width="14" height="2" rx="1"/><rect x="0" y="11" width="14" height="2" rx="1"/></svg>
            </button>
          </div>
          </div>
        </div>
        <div class="${isList ? 'overview-list' : 'overview-grid'}">${cards}</div>
      </div>`;
  }

  setViewMode(mode) {
    this.viewMode = mode;
    localStorage.setItem('dashboardViewMode', mode);
    this.showOverview();
  }

  setSortBy(sort) {
    this.sortBy = sort;
    this.showOverview();
  }

  toggleTheme() {
    this.theme = this.theme === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', this.theme);
    localStorage.setItem('conductorTheme', this.theme);
    this._updateThemeIcon();
  }

  _updateThemeIcon() {
    const icon = document.getElementById('themeIcon');
    if (!icon) return;
    if (this.theme === 'light') {
      // Sun icon
      icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
    } else {
      // Moon icon
      icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke-linecap="round" stroke-linejoin="round"/>';
    }
  }

  setStatusFilter(filter) {
    this.statusFilter = filter;
    this.showOverview();
  }

  // ─── Utilities ──────────────────────────────────────────────────────────
  filterSidebar(v) { this.searchFilter = v; this.renderSidebar(); }
  async refresh() { await this.loadProjects(); this.selectedSession ? await this.loadSessionDetail(this.selectedSession) : await this.showOverview(); this.loadTotalCost(); this.showToast('Refreshed', 'info'); }
  startPolling() { this.pollTimer = setInterval(() => { this.updateGlobalStats(); if (this.selectedSession) this.loadSessionDetail(this.selectedSession); this.loadTotalCost(); }, 5000); }

  formatStatus(s) { return { active: 'Active', idle: 'Idle', waiting_for_approval: 'Waiting', processing: 'Processing', completed: 'Done', paused: 'Paused' }[s] || s; }
  formatApprovalInput(tool, input) {
    if (!input) return '';
    if (tool === 'Bash') return `Command: ${input.command || JSON.stringify(input)}`;
    if (tool === 'Write') return `File: ${input.file_path}\n${(input.content || '').substring(0, 200)}...`;
    if (tool === 'Edit') return `File: ${input.file_path}\nOld: ${(input.old_string || '').substring(0, 80)}\nNew: ${(input.new_string || '').substring(0, 80)}`;
    return JSON.stringify(input, null, 2).substring(0, 400);
  }
  formatNum(n) { if (n >= 1000000) return (n/1000000).toFixed(1) + 'M'; if (n >= 1000) return (n/1000).toFixed(0) + 'K'; return String(n); }
  timeAgo(t) { if (!t) return ''; const ms = typeof t === 'number' ? t : new Date(t).getTime(); const d = Date.now() - ms; const s = Math.floor(d/1000), m = Math.floor(s/60), h = Math.floor(m/60), dy = Math.floor(h/24); if (s < 30) return 'Just now'; if (s < 60) return s+'s ago'; if (m < 60) return m+'m ago'; if (h < 24) return h+'h ago'; if (dy < 7) return dy+'d ago'; return new Date(ms).toLocaleDateString(); }
  formatTime(t) { if (!t) return ''; return new Date(t).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'}); }
  escapeHtml(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
  showToast(msg, type='info') { const c = document.getElementById('toastContainer'), t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg; c.appendChild(t); setTimeout(() => t.remove(), 4000); }
}

const app = new Dashboard();
app.init();

// Keyboard shortcut: Escape closes modal
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') app.closeInjectModal();
});
</script>
</body>
</html>
